<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <div class="card bg-dark text-white border-secondary shadow-lg rounded-4">
          <div class="card-body p-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <button class="btn btn-outline-light btn-sm" id="login-back-btn" type="button">Back</button>
              <span class="badge bg-info text-dark px-3 py-2">Croma</span>
            </div>

            <!-- Title -->
            <div class="text-center mb-4">
              <h3 class="fw-bold">Welcome Back</h3>
              <p class="text-secondary small">Login to continue shopping</p>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email or Phone</label>
              <input type="text" id="login-username" class="form-control bg-dark text-white border-secondary" placeholder="Enter email or phone">
              <small class="text-danger" id="login-username-error"></small>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" id="login-password" class="form-control bg-dark text-white border-secondary" placeholder="Enter password">
                <button type="button" class="btn btn-outline-secondary border-secondary" id="login-password-toggle" aria-label="Toggle password visibility">
                  <span id="login-password-eye" class="fw-semibold">Show</span>
                </button>
              </div>
              <small class="text-danger" id="login-password-error"></small>
            </div>

            <!-- Options -->
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label text-secondary small">Remember me</label>
              </div>
              <a href="#" class="text-info small text-decoration-none">Forgot?</a>
            </div>

            <!-- Button -->
            <button class="btn btn-info w-100 fw-semibold mb-3" id="login-submit-btn" type="button">Login</button>

            <!-- Signup -->
            <p class="text-center small text-secondary mb-0">
              Don't have an account?
              <a href="signup.html" class="text-info text-decoration-none fw-semibold">Sign Up</a>
            </p>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
