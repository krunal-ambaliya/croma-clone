<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="product-details-body">
  <div class="details-page">
    <header class="details-topbar">
      <button type="button" class="back-link" id="details-back-btn">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.5 5.5L8 12l6.5 6.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        Back
      </button>
      <a href="login.html" class="profile-link" aria-label="Profile">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 21a8 8 0 10-16 0" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
          <circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="2.2"></circle>
        </svg>
      </a>
    </header>

    <main class="details-card">
      <section class="details-image-panel">
        <span class="product-badge" id="productBadge">Top Pick</span>
        <img id="productImage" src="" alt="Product image">
      </section>

      <section class="details-info">
        <p class="mini-label">Product Details</p>
        <h1 id="productName">Smartphone</h1>
        <div class="rating-row">
          <span class="stars" id="productStars">★★★★★</span>
          <span class="reviews" id="productReviews">(0 reviews)</span>
        </div>
        <div class="price-row">
          <span class="current-price" id="productPrice">₹0</span>
          <span class="old-price" id="productOldPrice"></span>
        </div>
        <p class="desc">
          Powerful performance, sleek design, and a premium display packed into one smart device.
          This is a simple reusable product details page for your store layout.
        </p>

        <div class="highlights">
          <div class="chip">Fast Delivery</div>
          <div class="chip">1 Year Warranty</div>
          <div class="chip">Secure Payment</div>
        </div>

        <div class="action-row">
          <button type="button" class="primary-btn">Add to Cart</button>
          <button type="button" class="secondary-btn">Buy Now</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
